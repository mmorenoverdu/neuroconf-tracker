<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroConf Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #f2f1ed;
      --surface:    #ffffff;
      --indigo-bg:  #eceaf8;
      --border:     #d8d5ee;
      --border2:    #b8b3e0;
      --indigo:     #3730a3;
      --indigo-lt:  #6460c8;
      --text:       #111827;
      --text2:      #1e1b4b;
      --label:      #374151;
      --muted:      #6b7280;
      --red:        #b91c1c;
      --amber:      #b45309;
      --green:      #047857;
      --red-bg:     #fef2f2;
      --amber-bg:   #fffbeb;
      --green-bg:   #ecfdf5;
      --red-border: #fecaca;
      --amber-border:#fde68a;
      --green-border:#a7f3d0;
      --mono: 'DM Mono', monospace;
      --body: 'DM Sans', sans-serif;
      --display: 'Fraunces', serif;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(55,48,163,0.07), 0 6px 20px rgba(55,48,163,0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.55;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(55,48,163,0.08);
    }
    .header-inner {
      max-width: 1160px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 0; gap: 20px; flex-wrap: wrap;
    }
    .logo-title {
      font-family: var(--display);
      font-size: 26px; font-weight: 700;
      color: var(--text); letter-spacing: -0.02em;
    }
    .logo-title em { color: var(--indigo); font-style: normal; }
    .logo-sub {
      font-family: var(--mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 3px;
    }
    .header-stats { display: flex; gap: 36px; }
    .stat { text-align: right; }
    .stat-val { font-family: var(--display); font-size: 28px; font-weight: 700; color: var(--indigo); line-height: 1; }
    .stat-lbl { font-family: var(--mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1px; }

    /* ── LAYOUT ── */
    .wrap { max-width: 1160px; margin: 0 auto; padding: 28px 40px 0; }

    /* ── CHANGELOG BANNER ── */
    #changelog-banner {
      background: linear-gradient(135deg, #eef2ff, #f0edff);
      border: 1px solid #c7d2fe;
      border-radius: var(--radius);
      padding: 14px 20px;
      margin-bottom: 18px;
      display: none;
    }
    .cl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cl-title { font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--indigo); }
    .cl-date  { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .cl-items { display: flex; flex-direction: column; gap: 4px; }
    .cl-item  { font-size: 13px; color: var(--text2); display: flex; align-items: flex-start; gap: 8px; }
    .cl-tag   {
      font-family: var(--mono); font-size: 9px; font-weight: 500;
      padding: 2px 7px; border-radius: 3px; white-space: nowrap; margin-top: 2px;
    }
    .cl-new     { background: #dcfce7; color: #166534; }
    .cl-updated { background: #dbeafe; color: #1e40af; }
    .cl-warning { background: #fef9c3; color: #854d0e; }

    /* ── DEADLINE BANNER ── */
    .deadline-banner {
      background: linear-gradient(135deg, #fffbeb, #fef9ed);
      border: 1px solid var(--amber-border);
      border-radius: var(--radius); padding: 13px 20px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .dl-banner-label { font-family: var(--mono); font-size: 11px; color: var(--amber); font-weight: 500; letter-spacing: 0.06em; white-space: nowrap; }
    .dl-banner-items { display: flex; gap: 16px; flex-wrap: wrap; }
    .dl-banner-item { font-family: var(--mono); font-size: 11px; color: var(--label); }
    .dl-banner-item.urgent { color: var(--red); font-weight: 600; }
    .dl-banner-item.near   { color: var(--amber); font-weight: 500; }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    input[type=text] {
      flex: 1; min-width: 220px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 15px;
      color: var(--text); font-family: var(--body); font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type=text]:focus { border-color: var(--indigo-lt); box-shadow: 0 0 0 3px rgba(55,48,163,0.1); }
    input[type=text]::placeholder { color: var(--muted); }
    select {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 10px 15px;
      color: var(--text2); font-family: var(--mono); font-size: 12px;
      outline: none; cursor: pointer;
    }

    /* ── CATEGORY TAGS ── */
    .categories { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 22px; align-items: center; }
    .cat-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 2px; }
    .cat-btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1.5px solid var(--border2); background: var(--surface); color: var(--text2);
      padding: 6px 15px; border-radius: 20px;
      font-family: var(--body); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .cat-btn:hover { border-color: var(--indigo-lt); color: var(--indigo); background: var(--indigo-bg); }
    .cat-btn.active { border-color: var(--indigo); background: var(--indigo); color: #fff; box-shadow: 0 2px 8px rgba(55,48,163,0.25); }
    .cat-btn .cat-count { font-family: var(--mono); font-size: 10px; opacity: 0.6; }
    .cat-btn.active .cat-count { opacity: 0.8; }

    /* ── VIEW ROW ── */
    .view-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .count-label { font-family: var(--mono); font-size: 12px; color: var(--label); }
    .toggle-btns { display: flex; gap: 4px; }
    .toggle-btn {
      padding: 7px 16px; border-radius: 6px; cursor: pointer;
      font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
      border: 1.5px solid var(--border2); background: transparent; color: var(--label); transition: all 0.15s;
    }
    .toggle-btn.active { background: var(--indigo); border-color: var(--indigo); color: #fff; box-shadow: 0 2px 8px rgba(55,48,163,0.2); }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); }
    thead tr { border-bottom: 2px solid var(--border); }
    th {
      text-align: left; padding: 12px 16px;
      font-family: var(--mono); font-size: 10px;
      color: var(--label); text-transform: uppercase; letter-spacing: 0.1em;
      white-space: nowrap; background: #f7f6fc;
    }
    td { padding: 13px 16px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf9fd; }
    .conf-name { font-family: var(--display); font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .conf-org  { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
    .date-cell { white-space: nowrap; font-size: 13px; color: var(--text2); font-family: var(--mono); }
    .deadline-val { display: block; font-family: var(--mono); font-size: 12px; color: var(--text); }
    .days-badge { display: inline-block; font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; margin-top: 3px; font-weight: 500; }
    .days-urgent { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border); }
    .days-near   { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
    .days-ok     { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .days-past   { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .status-pill { display: inline-block; font-size: 10px; padding: 3px 9px; border-radius: 4px; font-family: var(--mono); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
    .pill-open   { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .pill-closed { background: var(--red-bg);   color: var(--red);   border: 1px solid var(--red-border); }
    .pill-tbd    { background: #f3f2f8; color: var(--label); border: 1px solid var(--border); }
    .link-cell a { color: var(--indigo); text-decoration: none; font-family: var(--mono); font-size: 11px; border-bottom: 1px solid rgba(55,48,163,0.3); padding-bottom: 1px; font-weight: 500; }
    .link-cell a:hover { border-color: var(--indigo); }
    .changed-row td { background: #f5f3ff !important; }
    .changed-row td:first-child { border-left: 3px solid var(--indigo); }

    /* ── CARDS ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px,1fr)); gap: 16px; }
    .card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 22px;
      position: relative; overflow: hidden;
      box-shadow: var(--shadow); transition: border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover { border-color: var(--border2); box-shadow: 0 6px 24px rgba(55,48,163,0.1); }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0; }
    .card.open::before   { background: linear-gradient(90deg, var(--green), #34d399); }
    .card.closed::before { background: linear-gradient(90deg, var(--red), #f87171); }
    .card.tbd::before    { background: linear-gradient(90deg, #9ca3af, #d1d5db); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
    .card-name { font-family: var(--display); font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .card-org  { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
    .card-meta { font-family: var(--mono); font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.9; }
    .card-meta strong { color: var(--text); }
    .card-deadlines { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .dl-block { background: var(--indigo-bg); border-radius: 8px; padding: 10px 12px; }
    .dl-label { font-family: var(--mono); font-size: 9px; color: var(--indigo-lt); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px; }
    .dl-date  { font-family: var(--mono); font-size: 12px; color: var(--text); font-weight: 500; }
    .card-notes { font-size: 13px; color: var(--label); line-height: 1.6; margin-bottom: 12px; font-style: italic; font-family: var(--display); font-weight: 400; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .card-link { color: var(--indigo); text-decoration: none; font-family: var(--mono); font-size: 11px; border-bottom: 1px solid rgba(55,48,163,0.3); font-weight: 500; }
    .card-link:hover { border-color: var(--indigo); }
    .card-fees { font-family: var(--mono); font-size: 10px; color: var(--label); max-width: 150px; text-align: right; }
    .card.changed { border-color: #a5b4fc; }
    .card.changed::after {
      content: '✦ Updated'; position: absolute; top: 12px; right: 14px;
      font-family: var(--mono); font-size: 9px; color: var(--indigo);
      background: #eef2ff; padding: 2px 7px; border-radius: 3px;
    }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 80px 0; font-family: var(--mono); color: var(--muted); font-size: 13px; }
    .last-updated { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; margin-top: 28px; }

    @media(max-width:640px){
      header{padding:0 16px;} .wrap{padding:20px 16px 0;} .header-stats{gap:16px;}
    }
  </style>
</head>

    <select onchange="currentStatus=this.value;render()">

  <div id="content"></div>
  <div class="last-updated" id="last-updated">Last verified: May 2026 · Always confirm deadlines on official websites.</div>
</div>

// ── STATE ────────────────────────────────────────────────────────────────────
let activeCategory = null;
let currentView    = 'table';
let currentSort    = 'date';
let currentStatus  = 'all';

// ── UTILS ─────────────────────────────────────────────────────────────────────
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const parseDate = s => (!s||s==='TBD') ? null : new Date(s);
const daysUntil = s => { const d=parseDate(s); return d ? Math.ceil((d-today())/86400000) : null; };
function fmtDate(s) {
  if(!s||s==='TBD') return '—';
  return parseDate(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtRange(s,e) {
  if(s==='TBD') return 'TBD';
  const ds=parseDate(s),de=parseDate(e);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(ds.getMonth()===de.getMonth()&&ds.getFullYear()===de.getFullYear())
    return `${ds.getDate()}–${de.getDate()} ${mo[ds.getMonth()]} ${ds.getFullYear()}`;
  return `${ds.getDate()} ${mo[ds.getMonth()]} – ${de.getDate()} ${mo[de.getMonth()]} ${ds.getFullYear()}`;
}
function badge(s) {
  const d=daysUntil(s);
  if(d===null) return '<span class="days-past">—</span>';
  if(d<0)      return '<span class="days-past">passed</span>';
  if(d<=14)    return `<span class="days-badge days-urgent">${d}d left</span>`;
  if(d<=60)    return `<span class="days-badge days-near">${d}d left</span>`;
  return       `<span class="days-badge days-ok">${d}d left</span>`;
}
function dlColor(s) {
  const d=daysUntil(s);
  if(d===null||d<0) return 'var(--muted)';
  if(d<=14) return 'var(--red)'; if(d<=60) return 'var(--amber)'; return 'var(--green)';
}
function pillHTML(st) {
  if(st==='open')   return '<span class="status-pill pill-open">Open</span>';
  if(st==='closed') return '<span class="status-pill pill-closed">Closed</span>';
  return '<span class="status-pill pill-tbd">TBD</span>';
}

// ── FILTER/SORT ───────────────────────────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const catIds = activeCategory ? CATEGORIES.find(c=>c.id===activeCategory)?.ids : null;
  let list = CONFERENCES.filter(c => {
    if(catIds && !catIds.includes(c.id)) return false;
    if(currentStatus!=='all' && c.status!==currentStatus) return false;
    if(q && !c.name.toLowerCase().includes(q) && !c.org.toLowerCase().includes(q)
       && !c.location.toLowerCase().includes(q) && !c.short.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b) => {
    if(currentSort==='name') return a.name.localeCompare(b.name);
    if(currentSort==='abstract') {
      const da=parseDate(a.abstractDeadline),db=parseDate(b.abstractDeadline);
      if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1; return da-db;
    }
    const da=parseDate(a.dates.start),db=parseDate(b.dates.start);
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1; return da-db;
  });
  return list;
}

// ── CHANGELOG ────────────────────────────────────────────────────────────────
function renderChangelog() {
  if(!CHANGELOG.length) return;
  const el = document.getElementById('changelog-banner');
  el.style.display = 'block';
  document.getElementById('cl-date').textContent = CHANGELOG[0]?.date || '';
  const items = CHANGELOG[0]?.changes || [];
  document.getElementById('cl-items').innerHTML = items.map(ch => `
    <div class="cl-item">
      <span class="cl-tag ${ch.type==='new'?'cl-new':ch.type==='updated'?'cl-updated':'cl-warning'}">
        ${ch.type.toUpperCase()}
      </span>
      <span><strong>${ch.conf}</strong> — ${ch.text}</span>
    </div>`).join('');
}

// ── DEADLINE BANNER ───────────────────────────────────────────────────────────
function renderDeadlineBanner() {
  const upcoming = CONFERENCES
    .filter(c => { const d=daysUntil(c.abstractDeadline); return d!==null&&d>=0&&d<=90; })
    .sort((a,b) => daysUntil(a.abstractDeadline)-daysUntil(b.abstractDeadline));
  const el = document.getElementById('deadline-banner');
  if(!upcoming.length) { el.style.display='none'; return; }
  el.innerHTML = `<span class="dl-banner-label">⚡ Abstract deadlines within 90 days</span>
    <div class="dl-banner-items">${upcoming.map(c => {
      const d=daysUntil(c.abstractDeadline);
      return `<span class="dl-banner-item ${d<=14?'urgent':d<=45?'near':''}">${c.short} <span style="opacity:.65">(${d}d)</span></span>`;
    }).join('')}</div>`;
}

// ── CATEGORIES ────────────────────────────────────────────────────────────────
function renderCategories() {
  document.getElementById('categories-bar').innerHTML =
    `<span class="cat-label">Filter by area:</span>` +
    CATEGORIES.map(cat => `
      <button class="cat-btn ${activeCategory===cat.id?'active':''}" onclick="toggleCat('${cat.id}')">
        ${cat.label} <span class="cat-count">${cat.ids.length}</span>
      </button>`).join('');
}
function toggleCat(id) { activeCategory = activeCategory===id ? null : id; render(); }

// ── TABLE ─────────────────────────────────────────────────────────────────────
function renderTable(list) {
  if(!list.length) return '<div class="empty">No conferences match your filters.</div>';
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Conference</th><th>Location</th><th>Dates</th>
      <th>Abstract Deadline</th><th>Early Registration</th>
      <th>Fees (approx.)</th><th>Status</th><th>Website</th>
    </tr></thead>
    <tbody>${list.map(c=>`<tr class="${c.changed?'changed-row':''}">
      <td><div class="conf-name">${c.name}${c.changed?' <span style="font-family:var(--mono);font-size:9px;color:var(--indigo);background:#eef2ff;padding:1px 5px;border-radius:3px;margin-left:4px">✦</span>':''}</div><div class="conf-org">${c.org}</div></td>
      <td class="date-cell">${c.location}</td>
      <td class="date-cell">${fmtRange(c.dates.start,c.dates.end)}</td>
      <td><span class="deadline-val" style="color:${dlColor(c.abstractDeadline)}">${fmtDate(c.abstractDeadline)}</span>${badge(c.abstractDeadline)}</td>
      <td><span class="deadline-val" style="color:${dlColor(c.earlyReg)}">${fmtDate(c.earlyReg)}</span>${badge(c.earlyReg)}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--label);max-width:160px">${c.fees==='TBD'?'—':c.fees}</td>
      <td>${pillHTML(c.status)}</td>
      <td class="link-cell"><a href="${c.website}" target="_blank" rel="noopener">↗ Visit</a></td>
    </tr>`).join('')}</tbody></table></div>`;
}

// ── CARDS ─────────────────────────────────────────────────────────────────────
function renderCards(list) {
  if(!list.length) return '<div class="empty">No conferences match your filters.</div>';
  return `<div class="cards">${list.map(c=>`
    <div class="card ${c.status}${c.changed?' changed':''}">
      <div class="card-header">
        <div><div class="card-name">${c.name}</div><div class="card-org">${c.org}</div></div>
        ${pillHTML(c.status)}
      </div>
      <div class="card-meta"><strong>📍</strong> ${c.location}<br><strong>🗓</strong> ${fmtRange(c.dates.start,c.dates.end)}</div>
      <div class="card-deadlines">
        <div class="dl-block">
          <div class="dl-label">Abstract</div>
          <div class="dl-date">${fmtDate(c.abstractDeadline)}</div>
          <div style="margin-top:4px">${badge(c.abstractDeadline)}</div>
        </div>
        <div class="dl-block">
          <div class="dl-label">Early Reg.</div>
          <div class="dl-date">${fmtDate(c.earlyReg)}</div>
          <div style="margin-top:4px">${badge(c.earlyReg)}</div>
        </div>
      </div>
      ${c.notes?`<div class="card-notes">${c.notes}</div>`:''}
      <div class="card-footer">
        <a class="card-link" href="${c.website}" target="_blank" rel="noopener">↗ Official website</a>
        ${c.fees!=='TBD'?`<span class="card-fees">${c.fees.split('/')[0].trim()}</span>`:''}
      </div>
    </div>`).join('')}</div>`;
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('total-count').textContent = CONFERENCES.length;
  document.getElementById('open-count').textContent  = CONFERENCES.filter(c=>c.status==='open').length;
  document.getElementById('upcoming-count').textContent = CONFERENCES.filter(c=>{
    const d=daysUntil(c.dates.start); return d!==null&&d>=0&&d<=90;
  }).length;
}

// ── VIEW TOGGLE ───────────────────────────────────────────────────────────────
function setView(v) {
  currentView=v;
  document.getElementById('btn-table').className='toggle-btn'+(v==='table'?' active':'');
  document.getElementById('btn-cards').className='toggle-btn'+(v==='cards'?' active':'');
  render();
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function render() {
  renderCategories();
  const list = getFiltered();
  document.getElementById('count-label').textContent = `${list.length} conference${list.length!==1?'s':''} shown`;
  document.getElementById('content').innerHTML = currentView==='table' ? renderTable(list) : renderCards(list);
}

renderChangelog();
renderDeadlineBanner();
updateStats();
render();
</script>
