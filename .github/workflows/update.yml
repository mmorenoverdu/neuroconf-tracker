name: Weekly Conference Update

on:
  schedule:
    # Every day at 08:00 UTC (change back to "0 8 * * 1" for weekly on Mondays)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Lets you trigger this manually from the GitHub Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated index.html

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py --write

      - name: Commit changes (if any)
        run: |
          git config user.name  "NeuroConf Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: weekly update $(date +'%Y-%m-%d')"

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
